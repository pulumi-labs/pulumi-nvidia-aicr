name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-provider:
    name: build provider (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: provider/go.sum
      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build provider binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/pulumi-resource-nvidia-aicr${ext}"
          (cd provider && go build \
            -ldflags "-X github.com/pulumi-labs/pulumi-nvidia-aicr/provider/pkg/version.Version=${{ steps.ver.outputs.version }}" \
            -o "../${out}" \
            ./cmd/pulumi-resource-nvidia-aicr)
          tar -czf "dist/pulumi-resource-nvidia-aicr-v${{ steps.ver.outputs.version }}-${GOOS}-${GOARCH}.tar.gz" \
            -C dist "pulumi-resource-nvidia-aicr${ext}"
          rm -f "${out}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  generate-sdks:
    name: generate SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: provider/go.sum
      - uses: pulumi/actions@v6
      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build provider with release version
        run: make provider VERSION=${{ steps.ver.outputs.version }}
      - name: Generate all SDKs
        run: make sdks VERSION=${{ steps.ver.outputs.version }}
      - name: Stamp version into SDK manifests (fallback)
        run: make set_version VERSION=${{ steps.ver.outputs.version }}
      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdks
          path: sdk/
          if-no-files-found: error

  publish-github-release:
    name: publish GitHub Release
    needs: [build-provider, generate-sdks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Bundle SDK source archives
        run: |
          mkdir -p release
          cp artifacts/provider-*/*.tar.gz release/
          cd artifacts/sdks
          for lang in nodejs python go dotnet java; do
            if [ -d "$lang" ]; then
              tar -czf "../../release/sdk-${lang}-${GITHUB_REF_NAME}.tar.gz" "$lang"
            fi
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # The publish-* jobs below push SDKs to public package registries. They are
  # disabled by default; enable them by populating the corresponding repository
  # secret (NPM_TOKEN, PYPI_API_TOKEN, NUGET_API_KEY, OSSRH_USERNAME +
  # OSSRH_PASSWORD) and removing the `if: false` guards.

  publish-nodejs:
    name: publish to npm
    if: false
    needs: generate-sdks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: sdks
          path: sdk
      - name: Install and build
        run: cd sdk/nodejs && npm install && npm run build
      - name: Publish
        run: cd sdk/nodejs && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: publish to PyPI
    if: false
    needs: generate-sdks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v4
        with:
          name: sdks
          path: sdk
      - name: Build distributions
        run: |
          cd sdk/python
          python -m pip install --upgrade build twine
          python -m build --sdist --wheel
      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: cd sdk/python && twine upload dist/*

  publish-dotnet:
    name: publish to NuGet
    if: false
    needs: generate-sdks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/download-artifact@v4
        with:
          name: sdks
          path: sdk
      - name: Pack and push
        run: |
          cd sdk/dotnet
          dotnet pack -c Release -o nupkgs
          dotnet nuget push 'nupkgs/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}"
