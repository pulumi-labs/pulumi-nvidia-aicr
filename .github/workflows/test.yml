name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: provider/go.sum
      - uses: pulumi/actions@v6
      - name: Build provider
        run: make provider
      - name: Generate schema
        run: make schema
      - name: Verify schema in repo matches generated schema
        run: |
          if ! git diff --exit-code provider/cmd/pulumi-resource-nvidia-aicr/schema.json; then
            echo "::error::schema.json is out of date. Run 'make schema' and commit the result."
            exit 1
          fi
      - name: Run vet
        run: cd provider && go vet ./...
      - name: Run tests
        run: make test

  build-sdks:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: provider/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - uses: pulumi/actions@v6
      - name: Generate all SDKs
        run: make sdks
      - name: Build Node.js SDK
        run: make build_nodejs_sdk
      - name: Build Python SDK
        run: make build_python_sdk
      - name: Build .NET SDK
        run: make build_dotnet_sdk
      - name: Build Java SDK
        run: make build_java_sdk
