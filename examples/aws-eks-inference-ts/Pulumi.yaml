name: aws-eks-h100-inference
runtime: nodejs
description: |
  Deploy an NVIDIA AICR-validated vLLM inference stack on AWS EKS.
  Creates an EKS cluster with H100 GPU nodes and deploys the full
  NIM inference stack via AICR recipes.

  COST WARNING: p5.48xlarge instances cost ~$98/hr each.
  This example provisions 2 nodes (~$196/hr). Destroy when done!
config:
  aws:region:
    default: us-east-1
