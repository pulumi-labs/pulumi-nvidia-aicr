# AWS EFA Health Check
#
# Validates that the AWS EFA K8s device plugin is running and healthy in the
# kube-system namespace. Checks that the aws-efa-k8s-device-plugin DaemonSet
# has at least one ready pod and that no EFA plugin pods (selected by label)
# are stuck in Pending, Failed, or Unknown phases. Label selectors are used
# because kube-system is a shared namespace.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: aws-efa-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-deployment-exists
      try:
        # Guard against vacuous pass: verify the aws-efa-k8s-device-plugin
        # DaemonSet exists and has at least one ready pod.
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: aws-efa-k8s-device-plugin
                namespace: kube-system
              status:
                (numberReady > `0`): true
    - name: validate-all-pods-healthy
      try:
        # Assert no EFA plugin pods are in unhealthy phases.
        # Uses label selector because kube-system is a shared namespace.
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: kube-system
                labels:
                  app.kubernetes.io/name: aws-efa-k8s-device-plugin
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: kube-system
                labels:
                  app.kubernetes.io/name: aws-efa-k8s-device-plugin
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: kube-system
                labels:
                  app.kubernetes.io/name: aws-efa-k8s-device-plugin
              status:
                phase: Unknown
