# GPU Operator Health Check
#
# Validates the GPU operator stack by checking pod phases in the gpu-operator
# namespace. The nvidia-operator-validator DaemonSet runs 4 sequential init
# containers (driver, toolkit, cuda, plugin) before reaching Running state.
# If it's Running, all validations passed. The nvidia-cuda-validator is a
# one-shot Pod created by the operator-validator; Succeeded means CUDA
# compute is functional. No log checks needed — pod phase is the definitive
# signal.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gpu-operator-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-deployment-exists
      try:
        # Guard against vacuous pass on empty namespace: verify the
        # gpu-operator deployment exists and has at least one ready replica.
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: gpu-operator
                namespace: gpu-operator
              status:
                (availableReplicas > `0`): true
    - name: validate-all-pods-healthy
      try:
        # Assert no pods are in unhealthy phases.
        # Pods must be Running (long-lived) or Succeeded (completed jobs).
        # This catches Pending (init containers, scheduling), Failed, and Unknown.
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: gpu-operator
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: gpu-operator
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: gpu-operator
              status:
                phase: Unknown
