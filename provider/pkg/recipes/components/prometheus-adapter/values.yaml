# Prometheus Adapter Helm values
# Enables Kubernetes HPA to scale workloads based on custom metrics from Prometheus

# TODO: add fullnameOverride once upstream PR merges:
# https://github.com/prometheus-community/helm-charts/pull/6584

# Prometheus connection configuration
prometheus:
  # URL of the Prometheus service deployed by kube-prometheus-stack
  # With fullnameOverride: kube-prometheus, the service name is kube-prometheus-prometheus
  url: http://kube-prometheus-prometheus
  port: 9090

# Custom metrics rules for GPU-based autoscaling
# These rules expose DCGM exporter metrics to the Kubernetes custom metrics API
rules:
  default: false
  custom:
    # GPU Utilization - scale based on GPU usage percentage
    # Uses last_over_time for faster HPA response (~60s vs ~4min with avg_over_time)
    - seriesQuery: 'DCGM_FI_DEV_GPU_UTIL{namespace!="",pod!=""}'
      metricsQuery: 'last_over_time(<<.Series>>[1m])'
      name:
        matches: "DCGM_FI_DEV_GPU_UTIL"
        as: "gpu_utilization"
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod: {resource: "pod"}

    # GPU Memory Usage - scale based on GPU memory consumption
    - seriesQuery: 'DCGM_FI_DEV_FB_USED{namespace!="",pod!=""}'
      metricsQuery: 'last_over_time(<<.Series>>[1m])'
      name:
        matches: "DCGM_FI_DEV_FB_USED"
        as: "gpu_memory_used"
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod: {resource: "pod"}

    # GPU Power Usage - scale based on power consumption
    - seriesQuery: 'DCGM_FI_DEV_POWER_USAGE{namespace!="",pod!=""}'
      metricsQuery: 'last_over_time(<<.Series>>[1m])'
      name:
        matches: "DCGM_FI_DEV_POWER_USAGE"
        as: "gpu_power_usage"
      resources:
        overrides:
          namespace: {resource: "namespace"}
          pod: {resource: "pod"}

    # Workload-attributed GPU metrics
    # DCGM exporter adds exported_namespace/exported_pod labels when a GPU is
    # actively used by a workload. These rules map those labels to Kubernetes
    # resources so HPA can read per-pod GPU metrics in the workload namespace.
    - seriesQuery: 'DCGM_FI_DEV_GPU_UTIL{exported_namespace!="",exported_pod!=""}'
      metricsQuery: 'last_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])'
      name:
        matches: "DCGM_FI_DEV_GPU_UTIL"
        as: "workload_gpu_utilization"
      resources:
        overrides:
          exported_namespace: {resource: "namespace"}
          exported_pod: {resource: "pod"}

    - seriesQuery: 'DCGM_FI_DEV_FB_USED{exported_namespace!="",exported_pod!=""}'
      metricsQuery: 'last_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])'
      name:
        matches: "DCGM_FI_DEV_FB_USED"
        as: "workload_gpu_memory_used"
      resources:
        overrides:
          exported_namespace: {resource: "namespace"}
          exported_pod: {resource: "pod"}

  # External metrics for cluster-wide GPU autoscaling (HPA type: External)
  # These are not scoped to any pod or namespace, enabling HPA in any namespace
  # to scale based on cluster-wide GPU metrics.
  # Uses avg_over_time for smoothing — external metrics feed dashboards/alerts
  # where spike resistance is preferred over responsiveness.
  external:
    - seriesQuery: 'DCGM_FI_DEV_GPU_UTIL'
      metricsQuery: 'avg(avg_over_time(DCGM_FI_DEV_GPU_UTIL[2m]))'
      name:
        matches: "DCGM_FI_DEV_GPU_UTIL"
        as: "dcgm_gpu_utilization"
      resources:
        namespaced: false

    - seriesQuery: 'DCGM_FI_DEV_FB_USED'
      metricsQuery: 'avg(avg_over_time(DCGM_FI_DEV_FB_USED[2m]))'
      name:
        matches: "DCGM_FI_DEV_FB_USED"
        as: "dcgm_gpu_memory_used"
      resources:
        namespaced: false

    - seriesQuery: 'DCGM_FI_DEV_POWER_USAGE'
      metricsQuery: 'avg(avg_over_time(DCGM_FI_DEV_POWER_USAGE[2m]))'
      name:
        matches: "DCGM_FI_DEV_POWER_USAGE"
        as: "dcgm_gpu_power_usage"
      resources:
        namespaced: false

# Shorten the metrics relist interval so external metrics discovery
# picks up new Prometheus series faster (chart default is 1m).
metricsRelistInterval: 30s

# Resource configuration for the adapter
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Replica count for high availability
replicas: 1
