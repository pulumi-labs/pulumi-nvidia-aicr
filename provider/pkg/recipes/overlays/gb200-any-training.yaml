kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gb200-any-training

spec:
  base: base

  criteria:
    service: any
    accelerator: gb200
    intent: training

  validation:
    performance:
      checks:
        - nccl-all-reduce-bw
      constraints:
        - name: nccl-all-reduce-bw
          value: ">= 720"
